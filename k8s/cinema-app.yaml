apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-web
  namespace: cinema
  labels:
    app: cinema-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cinema-web
  template:
    metadata:
      labels:
        app: cinema-web
    spec:
      containers:
        - name: cinema-web
          image: cinema-ticket-availability-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: cinema-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-web
  namespace: cinema
  labels:
    app: cinema-web
spec:
  type: ClusterIP
  selector:
    app: cinema-web
  ports:
    - port: 3000
      targetPort: http
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinema-web
  namespace: cinema
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: cinema.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cinema-web
                port:
                  number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cinema-web
  namespace: cinema
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cinema-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
