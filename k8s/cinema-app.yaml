apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinema-web
  template:
    metadata:
      labels:
        app: cinema-web
    spec:
      containers:
        - name: cinema-web
          image: cinema-ticket-availability-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_URL
              value: redis://cinema-redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-web
spec:
  type: ClusterIP
  selector:
    app: cinema-web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinema-web
spec:
  rules:
    - host: cinema.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cinema-web
                port:
                  number: 3000
