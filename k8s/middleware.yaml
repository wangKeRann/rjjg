# ── Redis ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-redis
  namespace: cinema
  labels:
    app: cinema-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinema-redis
  template:
    metadata:
      labels:
        app: cinema-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-redis
  namespace: cinema
spec:
  type: ClusterIP
  selector:
    app: cinema-redis
  ports:
    - port: 6379
      targetPort: redis

---
# ── Elasticsearch ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-elasticsearch
  namespace: cinema
  labels:
    app: cinema-elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinema-elasticsearch
  template:
    metadata:
      labels:
        app: cinema-elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-elasticsearch
  namespace: cinema
spec:
  type: ClusterIP
  selector:
    app: cinema-elasticsearch
  ports:
    - port: 9200
      targetPort: http

---
# ── Jaeger (OpenTelemetry trace backend) ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-jaeger
  namespace: cinema
  labels:
    app: cinema-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinema-jaeger
  template:
    metadata:
      labels:
        app: cinema-jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.62
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 14250
              name: grpc
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-jaeger
  namespace: cinema
spec:
  type: ClusterIP
  selector:
    app: cinema-jaeger
  ports:
    - port: 16686
      targetPort: ui
      name: ui
    - port: 14250
      targetPort: grpc
      name: grpc

---
# ── OpenTelemetry Collector ──────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: cinema-otel-collector
  namespace: cinema
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
    exporters:
      jaeger:
        endpoint: cinema-jaeger:14250
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: cinema
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [jaeger]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-otel-collector
  namespace: cinema
  labels:
    app: cinema-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinema-otel-collector
  template:
    metadata:
      labels:
        app: cinema-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          args:
            - "--config=/etc/otel-collector/config.yaml"
          ports:
            - containerPort: 4317
              name: grpc
            - containerPort: 4318
              name: http
            - containerPort: 8889
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: cinema-otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: cinema-otel-collector
  namespace: cinema
spec:
  type: ClusterIP
  selector:
    app: cinema-otel-collector
  ports:
    - port: 4317
      targetPort: grpc
      name: grpc
    - port: 4318
      targetPort: http
      name: http
    - port: 8889
      targetPort: metrics
      name: metrics
