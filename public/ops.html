<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>运维监控 - 影院订票系统</title><link rel="stylesheet" href="/styles.css" /></head>
  <body><div id="app" v-cloak><div class="ambient ambient-a"></div><div class="ambient ambient-b"></div>
    <header class="nav-shell glass"><div class="brand"><span class="brand-mark">C</span><div><strong>CinemaOS</strong><small>运维监控页</small></div></div><nav class="nav-links"><template v-if="session && session.user.role === 'ADMIN'"><a href="/admin-shows.html">调价</a><a href="/admin-sales.html">统计</a><a href="/ops.html">运维</a></template><template v-else-if="session && session.user.role === 'CUSTOMER'"><a href="/movies.html">影片</a><a href="/booking.html">选座</a><a href="/orders.html">订单</a></template><a v-else href="/login.html">登录</a></nav><div class="account-actions"><span v-if="session">{{ session.user.displayName }}</span><button v-if="session" class="login-button ghost" @click="logout">退出</button></div></header>
    <main><section class="hero compact-hero"><img class="hero-art" src="/assets/cinema-collage.png" /><div class="hero-overlay"></div><div class="hero-content"><p class="eyebrow">Member G</p><h1>运维监控页</h1><p>查看健康状态、部署拓扑和系统事件。</p></div></section>
      <section class="page-shell"><div class="section-head"><div><p class="eyebrow">Ops</p><h2>系统运行状态</h2></div><button class="ghost-button" @click="loadOps">刷新状态</button></div><div class="ops-grid"><article class="ops-card glass"><h3>健康状态</h3><div class="metric-row"><span>服务</span><strong>{{ health.status }}</strong></div><div class="metric-row"><span>Redis</span><strong>{{ health.redis }}</strong></div><div class="metric-row"><span>MQ</span><strong>运行中</strong></div><a href="/metrics" target="_blank">Prometheus 指标</a></article><article class="ops-card glass"><h3>部署拓扑</h3><div class="topology-grid"><div v-for="(items, key) in topology" :key="key"><strong>{{ key }}</strong><span v-for="item in items" :key="item">{{ item }}</span></div></div></article><article class="ops-card glass event-card"><h3>最近事件</h3><div class="event-list"><p v-for="event in events" :key="event.id"><strong>{{ event.type }}</strong><span>{{ event.at }}</span></p><p v-if="!events.length">暂无事件</p></div></article></div></section>
    </main>
  </div><script src="/vendor/vue.global.prod.js"></script><script type="module" src="/js/pages/ops.js"></script></body>
</html>
