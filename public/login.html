<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - 影院订票系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-body">
    <div id="app" v-cloak>
      <div class="auth-glow glow-left"></div>
      <div class="auth-glow glow-right"></div>

      <main class="auth-stage" @mousemove="trackMouse" @mouseleave="resetCat">
        <section class="auth-card glass">
          <article class="pet-side">
            <div class="pet-copy">
              <p class="eyebrow">CinemaOS Access</p>
              <h1>Welcome back.</h1>
            </div>

            <div class="cat-scene" aria-hidden="true">
              <div class="cat-orbit"></div>
              <div class="cat">
                <div class="cat-ear left"></div>
                <div class="cat-ear right"></div>
                <div class="cat-head">
                  <div class="cat-eye left"><span :style="eyeStyle"></span></div>
                  <div class="cat-eye right"><span :style="eyeStyle"></span></div>
                  <div class="cat-nose"></div>
                  <div class="cat-mouth"></div>
                  <div class="cat-whiskers left"><i></i><i></i><i></i></div>
                  <div class="cat-whiskers right"><i></i><i></i><i></i></div>
                </div>
                <div class="cat-body"></div>
                <div class="cat-tail"></div>
              </div>
            </div>
          </article>

          <section class="auth-panel">
            <div class="auth-brand">
              <span class="brand-mark">C</span>
              <div>
                <strong>CinemaOS</strong>
                <small>Sign in</small>
              </div>
            </div>

            <form class="auth-form" @submit.prevent="submit">
              <label>
                <span>账号</span>
                <input v-model.trim="login" autocomplete="username" placeholder="请输入账号" @input="notice = ''" />
              </label>
              <label>
                <span>密码</span>
                <input v-model="password" autocomplete="current-password" type="password" placeholder="请输入密码" @input="notice = ''" />
              </label>

              <button class="auth-submit" :disabled="busy || !login || !password">
                {{ busy ? '登录中...' : '登录' }}
              </button>
              <p class="auth-error" v-if="notice">{{ notice }}</p>
            </form>
          </section>
        </section>
      </main>
    </div>
    <script src="/vendor/vue.global.prod.js"></script>
    <script type="module" src="/js/pages/login.js"></script>
  </body>
</html>
