<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>场次调价 - 影院订票系统</title><link rel="stylesheet" href="/styles.css" /></head>
  <body><div id="app" v-cloak><div class="ambient ambient-a"></div><div class="ambient ambient-b"></div>
    <header class="nav-shell glass"><div class="brand"><span class="brand-mark">C</span><div><strong>CinemaOS</strong><small>管理员场次调价页</small></div></div><nav class="nav-links"><template v-if="session && session.user.role === 'ADMIN'"><a href="/admin-shows.html">调价</a><a href="/admin-sales.html">统计</a><a href="/ops.html">运维</a></template><template v-else-if="session && session.user.role === 'CUSTOMER'"><a href="/movies.html">影片</a><a href="/booking.html">选座</a><a href="/orders.html">订单</a></template><a v-else href="/login.html">登录</a></nav><div class="account-actions"><span v-if="session">{{ session.user.displayName }}</span><button v-if="session" class="login-button ghost" @click="logout">退出</button></div></header>
    <main><section class="hero compact-hero"><img class="hero-art" src="/assets/cinema-collage.png" /><div class="hero-overlay"></div><div class="hero-content"><p class="eyebrow">Member E</p><h1>管理员场次调价页</h1><p>查看场次售卖情况，并调整票价。</p></div></section>
      <section class="page-shell"><div class="section-head"><div><p class="eyebrow">Admin Shows</p><h2>场次调价</h2></div><button class="ghost-button" @click="loadDashboard">刷新后台</button></div><p class="login-hint" v-if="!isAdmin">请先用管理员账号登录：admin / admin123</p><div class="admin-table glass-soft" v-if="isAdmin"><div class="table-row table-head"><span>影片 / 影院</span><span>场次</span><span>售出</span><span>当前票价</span><span>操作</span></div><div class="table-row" v-for="show in dashboard?.shows || []" :key="show.id"><span><strong>{{ show.movieTitle }}</strong><small>{{ show.cinema }}</small></span><span>{{ show.startsAt }}<small>{{ show.hall }}</small></span><span>{{ show.soldSeats }}/{{ show.totalSeats }}</span><input type="number" min="1" max="999" v-model.number="priceDrafts[show.id]" /><button @click="updatePrice(show)">保存</button></div></div><p class="notice" v-if="notice">{{ notice }}</p></section>
    </main>
  </div><script src="/vendor/vue.global.prod.js"></script><script type="module" src="/js/pages/admin-shows.js"></script></body>
</html>
