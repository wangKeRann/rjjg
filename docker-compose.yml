version: "3.9"

services:
  cinema-web-a:
    build: .
    container_name: cinema-web-a
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "3001:3000"

  cinema-web-b:
    build: .
    container_name: cinema-web-b
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "3002:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: cinema-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cinema-web-a
      - cinema-web-b

  redis:
    image: redis:7-alpine
    container_name: cinema-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cinema-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: cinema-sentinel
    ports:
      - "8858:8858"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    container_name: cinema-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cinema-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - cinema-web-a
      - cinema-web-b

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: cinema-nacos
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
      - "9848:9848"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: cinema-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: cinema-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger

  flask-recommender:
    build: ./services/flask-recommender
    container_name: cinema-flask-recommender
    ports:
      - "5000:5000"