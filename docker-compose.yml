version: "3.9"

services:
  cinema-web-a:
    build: .
    container_name: cinema-web-a
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "3001:3000"

  cinema-web-b:
    build: .
    container_name: cinema-web-b
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "3002:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: cinema-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cinema-web-a
      - cinema-web-b

  redis:
    image: redis:7-alpine
    container_name: cinema-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cinema-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: cinema-sentinel
    ports:
      - "8858:8858"